<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Sarai_OS</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sarai_OS">
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/waifu_icon_v1/192/192">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pip-green: #22d3ee; /* Cyan-400 */
            --pip-dim: #164e63;   /* Cyan-900 */
            --pip-bg: #000000;    /* Pure Black */
        }
        
        html {
            height: 100dvh; /* Changed from 100% to 100dvh per user request */
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--pip-bg);
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100dvh; /* Changed from 100% to 100dvh per user request */
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'VT323', monospace;
            background-color: var(--pip-bg);
            color: var(--pip-green);
            overscroll-behavior: none;
            overflow: hidden;
        }
        
        #root {
            /* Use 100dvh to track dynamic viewport (keyboard) */
            height: 100dvh; 
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .screen-glow {
            text-shadow: 0 0 5px var(--pip-green), 0 0 10px var(--pip-green);
        }

        /* Animations */
        @keyframes breathe {
            0% { transform: scale(1); filter: contrast(1.1) brightness(1); }
            50% { transform: scale(1.05); filter: contrast(1.2) brightness(1.2); }
            100% { transform: scale(1); filter: contrast(1.1) brightness(1); }
        }
        .animate-speaking {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes thinking-pulse {
            0% { filter: hue-rotate(0deg) sepia(0.2) opacity(0.8); }
            50% { filter: hue-rotate(5deg) sepia(0.4) opacity(1); }
            100% { filter: hue-rotate(0deg) sepia(0.2) opacity(0.8); }
        }
        .animate-thinking {
            animation: thinking-pulse 4s ease-in-out infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scan-bar {
            width: 100%;
            height: 10px;
            background: rgba(34, 211, 238, 0.1);
            position: absolute;
            z-index: 51;
            animation: scanline 8s linear infinite;
            pointer-events: none;
            opacity: 0.3;
            /* Force GPU layer to prevent repaint lag */
            will-change: transform;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 12px;
            background: #000;
            border-left: 1px solid #172554;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e40af;
            border: 2px solid #000;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }
        
        .pip-border {
            border: 2px solid var(--pip-green);
            box-shadow: 0 0 10px var(--pip-green), inset 0 0 20px rgba(34, 211, 238, 0.2);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
